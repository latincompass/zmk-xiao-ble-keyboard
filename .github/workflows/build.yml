name: Build ZMK Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ZMK_VERSION: main

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build firmware for ${{ matrix.board }}-${{ matrix.shield }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 修正板名为 xiao_ble
          - board: xiao_ble
            shield: xiao_ble_keyboard
          - board: xiao_ble
            shield: xiao_ble_receiver

    steps:
      - name: Checkout user configuration
        uses: actions/checkout@v4
        with:
          path: config
          fetch-depth: 0

      - name: Cache West Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zephyr
            ~/.cache/west
            zmk/.west
            zmk/modules
            zmk/tools
          key: ${{ runner.os }}-zmk-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-zmk-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install West
        run: |
          pip3 install --upgrade pip
          pip3 install west

      - name: Initialize ZMK Repository
        run: |
          mkdir -p zmk
          cd zmk
          west init -l ../config
          west update
          west zephyr-export

      - name: Build Firmware
        run: |
          cd zmk/app
          west build -b ${{ matrix.board }} --pristine -- -DZMK_CONFIG=${{ github.workspace }}/config -DSHIELD=${{ matrix.shield }}

      - name: Rename UF2 File
        run: |
          mkdir -p firmware
          cp zmk/app/build/${{ matrix.board }}/zephyr/zmk.uf2 firmware/${{ matrix.board }}-${{ matrix.shield }}.uf2

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.board }}-${{ matrix.shield }}
          path: firmware/
