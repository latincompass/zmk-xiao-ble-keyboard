name: ZMK Build for XIAO BLE Keyboard & Receiver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发编译

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决 Node.js 20 警告
  ZMK_BASE: ${{ github.workspace }}/zmk
  CONFIG_PATH: ${{ github.workspace }}/config

jobs:
  build-keyboard:
    name: Build Keyboard Firmware (XIAO BLE)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout User Config
        uses: actions/checkout@v4
        with:
          path: config
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          sudo apt update && sudo apt install -y --no-install-recommends \
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler \
            wget python3-dev python3-pip python3-setuptools python3-tk python3-wheel \
            xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1 \
            libusb-1.0-0-dev libudev-dev

      - name: Install West
        run: |
          python3 -m pip install --upgrade pip
          pip3 install west

      - name: Initialize ZMK Repository
        run: |
          mkdir -p $ZMK_BASE
          cd $ZMK_BASE
          west init -m https://github.com/zmkfirmware/zmk --mr main
          west update
          west zephyr-export

      - name: Cache ZMK Dependencies
        uses: actions/cache@v4
        with:
          path: |
            $ZMK_BASE/.west
            $ZMK_BASE/modules
            $ZMK_BASE/tools
          key: ${{ runner.os }}-zmk-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-zmk-

      - name: Build Keyboard Firmware
        run: |
          cd $ZMK_BASE/app
          west build -b seeeduino_xiao_ble --pristine -- -DZMK_CONFIG=$CONFIG_PATH -DZMK_KEYBOARD=xiao_ble_keyboard

      - name: Upload Keyboard Firmware
        uses: actions/upload-artifact@v4
        with:
          name: xiao-ble-keyboard-firmware
          path: |
            $ZMK_BASE/app/build/seeeduino_xiao_ble/zephyr/zmk.uf2
            $ZMK_BASE/app/build/seeeduino_xiao_ble/zephyr/zmk.bin

  build-receiver:
    name: Build Receiver Firmware (XIAO BLE)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout User Config
        uses: actions/checkout@v4
        with:
          path: config
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          sudo apt update && sudo apt install -y --no-install-recommends \
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler \
            wget python3-dev python3-pip python3-setuptools python3-tk python3-wheel \
            xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1 \
            libusb-1.0-0-dev libudev-dev

      - name: Install West
        run: |
          python3 -m pip install --upgrade pip
          pip3 install west

      - name: Initialize ZMK Repository
        run: |
          mkdir -p $ZMK_BASE
          cd $ZMK_BASE
          west init -m https://github.com/zmkfirmware/zmk --mr main
          west update
          west zephyr-export

      - name: Cache ZMK Dependencies
        uses: actions/cache@v4
        with:
          path: |
            $ZMK_BASE/.west
            $ZMK_BASE/modules
            $ZMK_BASE/tools
          key: ${{ runner.os }}-zmk-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-zmk-

      - name: Build Receiver Firmware
        run: |
          cd $ZMK_BASE/app
          west build -b seeeduino_xiao_ble --pristine -- -DZMK_CONFIG=$CONFIG_PATH -DZMK_KEYBOARD=xiao_ble_receiver

      - name: Upload Receiver Firmware
        uses: actions/upload-artifact@v4
        with:
          name: xiao-ble-receiver-firmware
          path: |
            $ZMK_BASE/app/build/seeeduino_xiao_ble/zephyr/zmk.uf2
            $ZMK_BASE/app/build/seeeduino_xiao_ble/zephyr/zmk.bin
