name: ZMK Build for XIAO BLE Keyboard & Receiver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 手动触发编译

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决 Node.js 20 弃用警告
  ZMK_VERSION: main

jobs:
  build-keyboard:
    name: Build Keyboard Firmware (XIAO BLE)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache ZMK Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ./zmk/.west
            ./zmk/modules
            ./zmk/tools
          key: ${{ runner.os }}-zmk-${{ hashFiles('west.yml') }}
          restore-keys: |
            ${{ runner.os }}-zmk-

      - name: Setup ZMK Build Environment
        uses: zmkfirmware/zmk-build-action@v6
        with:
          board: seeeduino_xiao_ble
          config: xiao_ble_keyboard
          west-config: west.yml

      - name: Upload Keyboard Firmware
        uses: actions/upload-artifact@v4
        with:
          name: xiao-ble-keyboard-firmware
          path: |
            ./zmk/app/build/seeeduino_xiao_ble/zephyr/zmk.uf2
            ./zmk/app/build/seeeduino_xiao_ble/zephyr/zmk.bin

  build-receiver:
    name: Build Receiver Firmware (XIAO BLE)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache ZMK Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ./zmk/.west
            ./zmk/modules
            ./zmk/tools
          key: ${{ runner.os }}-zmk-${{ hashFiles('west.yml') }}
          restore-keys: |
            ${{ runner.os }}-zmk-

      - name: Setup ZMK Build Environment
        uses: zmkfirmware/zmk-build-action@v6
        with:
          board: seeeduino_xiao_ble
          config: xiao_ble_receiver
          west-config: west.yml

      - name: Upload Receiver Firmware
        uses: actions/upload-artifact@v4
        with:
          name: xiao-ble-receiver-firmware
          path: |
            ./zmk/app/build/seeeduino_xiao_ble/zephyr/zmk.uf2
            ./zmk/app/build/seeeduino_xiao_ble/zephyr/zmk.bin
